<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>24h focus.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F9F9FB; -webkit-font-smoothing: antialiased; }
    .card-shadow { box-shadow: 0 4px 24px rgba(0,0,0,0.04); }
    .card-shadow-hover { box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .progress-bar { position: fixed; top: 0; left: 0; right: 0; height: 2px; background: rgba(0,0,0,0.06); z-index: 50; }
    .progress-fill { height: 100%; background: black; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
    .task-card { transition: box-shadow 0.2s, opacity 0.25s, transform 0.25s; }
    .task-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    .task-enter { animation: taskIn 0.25s cubic-bezier(0.4,0,0.2,1) forwards; }
    .task-exit { animation: taskOut 0.2s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes taskIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes taskOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-8px) scale(0.97); } }
    .check-bounce { animation: checkBounce 0.2s cubic-bezier(0.4,0,0.2,1); }
    @keyframes checkBounce { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
    .graveyard-list { overflow: hidden; transition: max-height 0.25s cubic-bezier(0.4,0,0.2,1), opacity 0.25s; }
    .action-btns { opacity: 0; transition: opacity 0.15s; }
    .task-card:hover .action-btns, .task-card:focus-within .action-btns { opacity: 1; }
    .revive-btn { opacity: 0; transition: opacity 0.15s; }
    .graveyard-item:hover .revive-btn, .graveyard-item:focus-within .revive-btn { opacity: 1; }
    .chevron { transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }
    button:focus-visible { outline: 2px solid rgba(0,0,0,0.2); outline-offset: 2px; border-radius: 9999px; }
  </style>
</head>
<body>

<div id="progress-bar" class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-label="Tasks completed">
  <div id="progress-fill" class="progress-fill" style="width:0%"></div>
</div>

<main class="min-h-screen px-6 py-20">
  <div class="mx-auto max-w-[480px]">

    <!-- Header -->
    <header class="mb-10">
      <h1 class="text-[22px] font-bold tracking-tight text-black leading-none">24h focus.</h1>
      <p id="subtitle" class="text-[13px] text-[#94A3B8] font-light mt-1">Add something to focus on today.</p>
    </header>

    <!-- Input -->
    <div class="relative flex items-center">
      <input
        id="task-input"
        type="text"
        placeholder="What is your focus for today?"
        aria-label="Add a new task"
        class="w-full rounded-full border border-black/[0.08] bg-white px-6 py-4 pr-14 text-[15px] font-medium text-black placeholder:text-[#94A3B8] placeholder:font-normal card-shadow focus:outline-none focus:ring-2 focus:ring-black/10 transition-shadow duration-200 hover:card-shadow-hover"
      />
      <button
        id="add-btn"
        aria-label="Add task"
        class="absolute right-2 flex items-center justify-center w-9 h-9 rounded-full bg-black text-white hover:bg-black/80 active:scale-95 transition-all duration-150"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <!-- Active list -->
    <ul id="active-list" class="mt-4 space-y-2" role="list" aria-label="Today's tasks"></ul>

    <!-- Empty state -->
    <div id="empty-state" class="mt-12 text-center hidden">
      <p class="text-4xl mb-3">✦</p>
      <p class="text-[14px] text-[#94A3B8] font-light">Your slate is clean.</p>
    </div>

    <!-- Graveyard -->
    <div id="graveyard" class="mt-8 hidden">
      <button id="graveyard-toggle" aria-expanded="false" class="flex items-center gap-2 text-[#94A3B8] text-sm font-medium w-full">
        <span class="flex-1 text-left">Yesterday</span>
        <span id="graveyard-count" class="text-xs bg-black/5 text-black/30 rounded-full px-2 py-0.5">0</span>
        <svg id="graveyard-chevron" class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <ul id="graveyard-list" class="graveyard-list mt-3 space-y-2 overflow-hidden max-h-0 opacity-0" role="list" aria-label="Expired tasks from yesterday"></ul>
    </div>

  </div>
</main>

<script>
const H24 = 24 * 60 * 60 * 1000;
const H48 = 48 * 60 * 60 * 1000;

// ── Storage ──────────────────────────────────────────────
function loadTasks() {
  try { return JSON.parse(localStorage.getItem('24h-focus-tasks') || '[]'); }
  catch { return []; }
}
function saveTasks(tasks) {
  try { localStorage.setItem('24h-focus-tasks', JSON.stringify(tasks)); }
  catch {}
}

let tasks = loadTasks();

// ── Helpers ───────────────────────────────────────────────
function classify(tasks) {
  const now = Date.now();
  const active = [], expired = [];
  for (const t of tasks) {
    const age = now - t.createdAt;
    if (age >= H48) continue;
    if (age >= H24) expired.push(t);
    else active.push(t);
  }
  active.sort((a, b) => {
    if (a.priority !== b.priority) return (b.priority ? 1 : 0) - (a.priority ? 1 : 0);
    return b.createdAt - a.createdAt;
  });
  return { active, expired };
}

function timeLeft(createdAt) {
  const diff = H24 - (Date.now() - createdAt);
  if (diff <= 0) return null;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return h === 0 ? `${m}m left` : `${h}h left`;
}

function badgeClass(createdAt) {
  const pct = (Date.now() - createdAt) / H24;
  if (pct > 0.85) return 'text-red-400 bg-red-50';
  if (pct > 0.60) return 'text-amber-500 bg-amber-50';
  return 'text-[#94A3B8] bg-black/5';
}

function hoursAgo(createdAt) {
  const h = Math.floor((Date.now() - createdAt) / 3600000);
  return h === 1 ? '1 hour ago' : `${h} hours ago`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render ────────────────────────────────────────────────
function render() {
  const { active, expired } = classify(tasks);
  const done = active.filter(t => t.done).length;
  const total = active.length;

  // Progress bar
  const pct = total === 0 ? 0 : Math.round((done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-bar').setAttribute('aria-valuenow', pct);

  // Subtitle
  document.getElementById('subtitle').textContent =
    total === 0 ? 'Add something to focus on today.' : `${done} of ${total} done today`;

  // Active list
  const list = document.getElementById('active-list');
  list.innerHTML = '';
  active.forEach(task => {
    const li = document.createElement('li');
    li.className = 'task-card task-enter bg-white rounded-3xl px-5 py-4 card-shadow flex items-center gap-4 group';
    const remaining = timeLeft(task.createdAt);
    const badge = remaining && !task.done
      ? `<span class="text-[11px] font-light mt-0.5 px-2 py-0.5 rounded-full inline-block ${badgeClass(task.createdAt)}">${remaining}</span>`
      : '';
    const priorityIcon = task.priority && !task.done
      ? `<svg class="inline -mt-0.5 mr-1" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
      : '';

    li.innerHTML = `
      <button class="flex-shrink-0 focus:outline-none" aria-label="${task.done ? 'Mark as not done' : 'Mark as done'}" aria-pressed="${task.done}" data-action="toggle" data-id="${task.id}">
        <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-colors duration-200 ${task.done ? 'border-black bg-black check-bounce' : 'border-black/20 hover:border-black/50'}">
          ${task.done ? `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
        </div>
      </button>
      <div class="flex-1 min-w-0">
        <p class="text-[15px] font-medium leading-snug truncate ${task.done ? 'text-[#94A3B8] line-through decoration-[#94A3B8]' : 'text-black'}">${priorityIcon}${escHtml(task.text)}</p>
        ${badge}
      </div>
      <div class="action-btns flex items-center gap-1">
        <button data-action="priority" data-id="${task.id}" aria-label="${task.priority ? 'Remove priority' : 'Mark as priority'}" aria-pressed="${task.priority}"
          class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold transition-colors duration-150 ${task.priority ? 'bg-black text-white' : 'bg-black/5 text-black/40 hover:bg-black/10'}">!</button>
        <button data-action="delete" data-id="${task.id}" aria-label="Delete task"
          class="w-7 h-7 rounded-full flex items-center justify-center bg-black/5 text-black/30 hover:bg-red-50 hover:text-red-400 transition-colors duration-150">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    list.appendChild(li);
  });

  // Empty state
  document.getElementById('empty-state').classList.toggle('hidden', active.length > 0);

  // Graveyard
  const graveyard = document.getElementById('graveyard');
  if (expired.length === 0) {
    graveyard.classList.add('hidden');
  } else {
    graveyard.classList.remove('hidden');
    document.getElementById('graveyard-count').textContent = expired.length;
    const gList = document.getElementById('graveyard-list');
    gList.innerHTML = '';
    expired.forEach(task => {
      const li = document.createElement('li');
      li.className = 'graveyard-item flex items-center gap-4 bg-white/60 rounded-3xl px-5 py-4 border border-black/[0.04]';
      li.innerHTML = `
        <div class="w-6 h-6 rounded-full border-2 border-black/10 flex-shrink-0"></div>
        <div class="flex-1 min-w-0">
          <p class="text-[14px] font-medium text-black/30 line-through decoration-black/[0.15] truncate">${escHtml(task.text)}</p>
          <p class="text-[11px] font-light text-black/20 mt-0.5">${hoursAgo(task.createdAt)}</p>
        </div>
        <button data-action="revive" data-id="${task.id}" aria-label="Revive ${escHtml(task.text)}"
          class="revive-btn flex-shrink-0 flex items-center gap-1.5 text-[11px] font-medium text-[#94A3B8] hover:text-black transition-all duration-150 rounded-full px-2 py-1">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.79"/></svg>
          Revive
        </button>`;
      gList.appendChild(li);
    });
  }
}

// ── Graveyard toggle ──────────────────────────────────────
let graveyardOpen = false;
document.getElementById('graveyard-toggle').addEventListener('click', () => {
  graveyardOpen = !graveyardOpen;
  const list = document.getElementById('graveyard-list');
  const chevron = document.getElementById('graveyard-chevron');
  const toggle = document.getElementById('graveyard-toggle');
  if (graveyardOpen) {
    list.style.maxHeight = list.scrollHeight + 500 + 'px';
    list.style.opacity = '1';
    chevron.classList.add('open');
    toggle.setAttribute('aria-expanded', 'true');
  } else {
    list.style.maxHeight = '0';
    list.style.opacity = '0';
    chevron.classList.remove('open');
    toggle.setAttribute('aria-expanded', 'false');
  }
});

// ── Event delegation ──────────────────────────────────────
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const { action, id } = btn.dataset;

  if (action === 'toggle') {
    tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
  } else if (action === 'priority') {
    tasks = tasks.map(t => t.id === id ? { ...t, priority: !t.priority } : t);
  } else if (action === 'delete') {
    tasks = tasks.filter(t => t.id !== id);
  } else if (action === 'revive') {
    tasks = tasks.map(t => t.id === id ? { ...t, createdAt: Date.now(), done: false } : t);
    // Re-open graveyard after revive if still has items
    graveyardOpen = true;
  }

  saveTasks(tasks);
  render();

  // Keep graveyard open after re-render
  if (graveyardOpen) {
    const list = document.getElementById('graveyard-list');
    if (list) {
      list.style.maxHeight = list.scrollHeight + 500 + 'px';
      list.style.opacity = '1';
      document.getElementById('graveyard-chevron')?.classList.add('open');
      document.getElementById('graveyard-toggle')?.setAttribute('aria-expanded', 'true');
    }
  }
});

// ── Add task ──────────────────────────────────────────────
function addTask() {
  const input = document.getElementById('task-input');
  const text = input.value.trim();
  if (!text) return;
  tasks.push({ id: crypto.randomUUID(), text, createdAt: Date.now(), done: false, priority: false });
  saveTasks(tasks);
  input.value = '';
  render();
}

document.getElementById('add-btn').addEventListener('click', addTask);
document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// ── Purge + tick ──────────────────────────────────────────
function purge() {
  const before = tasks.length;
  tasks = tasks.filter(t => Date.now() - t.createdAt < H48);
  if (tasks.length !== before) saveTasks(tasks);
  render();
}

purge();
setInterval(purge, 60_000);
</script>
</body>
</html>
